name: rescueradio

services:
  api:
    image: ${API_IMAGE:-rescueradio-api:local}
    container_name: rescueradio-api
    restart: unless-stopped
    environment:
      UDP_HOST: 0.0.0.0
      UDP_PORT: 9000
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://rescueradio:rescueradio@postgres:5432/rescueradio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DISCONNECT_GRACE_SECONDS: ${DISCONNECT_GRACE_SECONDS:-2}
    ports:
      - "${API_HTTP_PORT:-8000}:8000"
      - "${API_UDP_PORT:-9000}:9000/udp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rescueradio-network

  web:
    image: ${WEB_IMAGE:-rescueradio-web:local}
    container_name: rescueradio-web
    restart: unless-stopped
    environment:
      GATEWAY_WS_URL: ${GATEWAY_WS_URL:-ws://localhost:8001}
    ports:
      - "${WEB_PORT:-4200}:80"
    depends_on:
      - api
      - kong
    networks:
      - rescueradio-network

  kong:
    image: kong:3.6
    container_name: rescueradio-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ../kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "${KONG_PROXY_PORT:-8001}:8000"
      - "${KONG_ADMIN_PORT:-8002}:8001"
    depends_on:
      - api
    networks:
      - rescueradio-network

  postgres:
    image: postgres:16-alpine
    container_name: rescueradio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rescueradio}
      POSTGRES_USER: ${POSTGRES_USER:-rescueradio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rescueradio}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rescueradio} -d ${POSTGRES_DB:-rescueradio}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rescueradio-network

  redis:
    image: redis:7-alpine
    container_name: rescueradio-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rescueradio-network

networks:
  rescueradio-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
