services:
  api:
    image: ${API_IMAGE:-rescueradio-api:local}
    container_name: rescueradio-api
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-8000}:8000"
      - "${API_UDP_PORT:-9000}:9000/udp"
    networks:
      - rescueradio-network

  web:
    image: ${WEB_IMAGE:-rescueradio-web:local}
    container_name: rescueradio-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4200}:80"
    depends_on:
      - api
      - kong
    networks:
      - rescueradio-network

  kong:
    image: kong:3.6
    container_name: rescueradio-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ../kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "${KONG_PROXY_PORT:-8001}:8000"
      - "${KONG_ADMIN_PORT:-8002}:8001"
    depends_on:
      - api
    networks:
      - rescueradio-network

networks:
  rescueradio-network:
    driver: bridge
